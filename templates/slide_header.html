<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <style>{{ css_content }}</style>
</head>
<body>
<div class="slide-header">
    {% if logo_path %}<img src="{{ logo_path }}" class="header-logo" alt="WMH Project">{% endif %}
    <h2>{{ title }}</h2>
    <div class="title-separator"></div>
    <div class="subtitle">{{ subtitle }}</div>
    <div class="week-badge">Semaine {{ week_number }} — {{ week_dates }}</div>
    <div class="footer">©WMH Project — {{ year }}</div>
</div>
</body>
</html>
